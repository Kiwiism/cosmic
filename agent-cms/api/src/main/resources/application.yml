server:
  port: ${AGENT_CMS_API_PORT:8084}
spring:
  datasource:
    url: ${AGENT_CMS_DB_URL:jdbc:mysql://localhost:3306/cosmic_agent_cms?createDatabaseIfNotExist=true}
    username: ${AGENT_CMS_DB_USER:root}
    password: ${AGENT_CMS_DB_PASSWORD:}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
cosmic:
  game-database:
    url: ${COSMIC_DB_URL:jdbc:mysql://localhost:3306/cosmic?createDatabaseIfNotExist=false}
    username: ${COSMIC_DB_USER:${AGENT_CMS_DB_USER:root}}
    password: ${COSMIC_DB_PASSWORD:${AGENT_CMS_DB_PASSWORD:}}
  game:
    host: ${COSMIC_GAME_HOST:127.0.0.1}
    login-port: ${COSMIC_LOGIN_PORT:8484}
    channel-port-base: ${COSMIC_CHANNEL_PORT_BASE:7575}
    world-port-stride: ${COSMIC_WORLD_PORT_STRIDE:100}
    connect-timeout-millis: ${COSMIC_GAME_CONNECT_TIMEOUT_MILLIS:1500}
  agent-runtime:
    store-created-account-passwords: ${AGENT_CMS_STORE_CREATED_ACCOUNT_PASSWORDS:true}
  agent-client:
    url: ${AGENT_CLIENT_API_URL:http://127.0.0.1:8094}
  wz-path: ${COSMIC_WZ_PATH:../../wz}
  allowed-origin: ${AGENT_CMS_ALLOWED_ORIGIN:http://localhost:3002}
